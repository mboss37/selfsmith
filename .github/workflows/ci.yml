name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions:
  contents: read
jobs:
  test:
    name: Example tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r examples/prompt-technique-tournament/requirements.txt
      - name: Run example + guardrail corpus
        working-directory: examples/prompt-technique-tournament
        run: python -m pytest eval/ -q --no-header
  guardrail-integrity:
    name: Guardrail integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hooks parse
        run: |
          bash -n template/.claude/hooks/guardrail.sh
          bash -n examples/prompt-technique-tournament/.claude/hooks/guardrail.sh
      - name: Floor 2 present and identical across template + example
        run: |
          grep -qF 'Floor 2 — MACHINE SAFETY' template/.claude/hooks/guardrail.sh
          grep -qF 'Floor 2 — MACHINE SAFETY' examples/prompt-technique-tournament/.claude/hooks/guardrail.sh
          diff <(sed -n '/Floor 2/,$p' template/.claude/hooks/guardrail.sh) \
               <(sed -n '/Floor 2/,$p' examples/prompt-technique-tournament/.claude/hooks/guardrail.sh)
      - name: Hooks wired for Bash AND write tools
        run: |
          grep -q 'Bash|Edit|Write|MultiEdit' template/.claude/settings.json
          grep -q 'Bash|Edit|Write|MultiEdit' examples/prompt-technique-tournament/.claude/settings.json
